<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Vision Extraction | Sublime Management Group</title>
</head>
<body>
    <div class="logo">Sublime MANAGEMENT GROUP</div>
    
    <h1>Signal Audit: Architectural Intake</h1>
    
    <form action="https://formspree.io/f/mojbynnr" method="POST">
        <label style="display:block; color:#a67c52; margin-bottom:5px; font-size:0.8rem;">LEAD IDENTITY</label>
        <input type="text" name="name" placeholder="Full Name & Title" required>
        
        <label style="display:block; color:#a67c52; margin-bottom:5px; font-size:0.8rem;">VENTURE SPECIFICATIONS</label>
        <input type="text" name="company" placeholder="Organization Name" required>
        <input type="text" name="revenue_stage" placeholder="Current Revenue Stage / Operational Scale" required>
        
        <label style="display:block; color:#a67c52; margin-bottom:5px; font-size:0.8rem;">CORE FRICTION POINTS</label>
        <textarea name="friction_analysis" rows="5" placeholder="Detail the structural misalignment currently hindering output." required></textarea>
        
        <label style="display:block; color:#a67c52; margin-bottom:5px; font-size:0.8rem;">LEADERSHIP GAP</label>
        <textarea name="leadership_gap" rows="5" placeholder="Define the delta between current execution and the intended vision." required></textarea>
        
        <label style="display:block; color:#a67c52; margin-bottom:5px; font-size:0.8rem;">STRATEGIC INTENT</label>
        <textarea name="strategic_intent" rows="5" placeholder="What is the non-negotiable outcome for this build?" required></textarea>
        
        <button type="submit" class="btn">EXECUTE SIGNAL AUDIT</button>
    </form>

    <footer style="margin-top:auto; padding:40px 0; font-size:0.7rem; color:#555; text-transform:uppercase; letter-spacing:2px; text-align:center;">&copy; 2026 SUBLIME MANAGEMENT GROUP. ALL RIGHTS RESERVED.</footer>
</body>
</html>
