<form action="https://formspree.io/f/mojbynnr" method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="text" name="venture" placeholder="Venture Name" required>
    <select name="industry">
        <option value="">Select Industry</option>
        <option value="Hospitality">Hospitality</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Finance">Finance</option>
    </select>
    <input type="text" name="pain_point" placeholder="Current Scaling Pain Point" required>
    
    <label>Are you seeking a vendor or an equity-aligned partner?</label>
    <input type="text" name="alignment" required>
    
    <label>What is the primary operational overwhelm preventing your vision?</label>
    <textarea name="overwhelm" required></textarea>
    
    <button type="submit" class="btn">COMMIT DATA TO ARCHITECTURE</button>
</form>
