<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sublime Management Group | Vision Extraction</title>
    <style>
        :root { --bg: #050505; --white: #ffffff; --bronze: #a67c52; --grey: #a0a0a0; --border: #222; }
        body { font-family: 'Georgia', serif; background-color: var(--bg); color: var(--white); margin: 0; line-height: 1.6; }
        nav, section { padding: 40px 10%; }
        nav { border-bottom: 1px solid var(--border); }
        .logo { letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; }
        h1 { font-size: 3.5rem; line-height: 1.1; margin-bottom: 30px; }
        .accent { color: var(--bronze); font-style: italic; }
        .step { display: none; }
        .step.active { display: block; }
        input, select, textarea { width: 100%; background: #111; border: 1px solid var(--border); color: var(--white); padding: 15px; margin-bottom: 20px; font-family: 'Georgia', serif; box-sizing: border-box;}
        button { background: var(--bronze); color: #000; padding: 15px 30px; border: none; text-transform: uppercase; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <nav><div class="logo">Sublime MANAGEMENT GROUP</div></nav>
    <section>
        <h1>Vision Extraction <span class="accent">Architecture.</span></h1>
        <form id="extractionForm" action="https://formspree.io/f/mojbynnr" method="POST">
            <div id="step1" class="step active">
                <h3>01: Founder Identity</h3>
                <input type="text" name="name" placeholder="Founder Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <button type="button" onclick="nextStep(2)">NEXT STEP &rarr;</button>
            </div>
            <div id="step2" class="step">
                <h3>02: Company Profile</h3>
                <select name="stage"><option>Company Stage</option><option>Concept</option><option>Scaling</option></select>
                <select name="revenue"><option>Revenue Range</option><option>Pre-Revenue</option><option>$1M - $5M</option></select>
                <button type="button" onclick="nextStep(3)">NEXT STEP &rarr;</button>
            </div>
            <div id="step3" class="step">
                <h3>03: Vision Codification</h3>
                <textarea name="vision" rows="6" placeholder="Describe the Skyscraper you are building..."></textarea>
                <button type="submit">COMMIT TO ARCHITECTURE</button>
            </div>
        </form>
    </section>
    <script>
        function nextStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }
    </script>
</body>
</html>
